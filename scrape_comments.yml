---
- name: Scrape YouTube comments and publish RSS feed
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    tier: "all"
    repo_url: "git@github.com:ansible-tmm/youtube-comments-feed.git"
    work_dir: "/tmp/youtube-comments-scrape"
    feed_repo_dir: "/tmp/youtube-comments-feed"
    cookies_file: "{{ work_dir }}/cookies.txt"

  tasks:
    - name: Ensure pip dependencies are installed
      ansible.builtin.pip:
        name:
          - yt-dlp
          - certifi
        state: present

    - name: Check if deno is installed
      ansible.builtin.command:
        cmd: deno --version
      register: deno_check
      ignore_errors: true
      changed_when: false

    - name: Install deno for yt-dlp JavaScript extraction
      ansible.builtin.shell:
        cmd: curl -fsSL https://deno.land/install.sh | sh
      environment:
        DENO_INSTALL: /usr/local
      when: deno_check.rc != 0

    - name: Check if feed repo exists
      ansible.builtin.stat:
        path: "{{ feed_repo_dir }}/.git"
      register: repo_check

    - name: Clone feed repo
      ansible.builtin.command:
        cmd: "git clone {{ repo_url }} {{ feed_repo_dir }}"
      when: not repo_check.stat.exists

    - name: Pull latest feed repo
      ansible.builtin.command:
        cmd: "git -C {{ feed_repo_dir }} pull --ff-only"
      when: repo_check.stat.exists

    - name: Configure git user for commits
      ansible.builtin.command:
        cmd: "{{ item }}"
      loop:
        - "git -C {{ feed_repo_dir }} config user.email aap-scraper@ansible-tmm"
        - "git -C {{ feed_repo_dir }} config user.name AAP-Scraper"

    - name: Create work directory
      ansible.builtin.file:
        path: "{{ work_dir }}"
        state: directory
        mode: "0755"

    - name: Copy scraper script to work directory
      ansible.builtin.copy:
        src: pull_comments.py
        dest: "{{ work_dir }}/pull_comments.py"
        mode: "0755"

    - name: Write YouTube cookies file
      ansible.builtin.copy:
        content: "{{ youtube_cookies }}"
        dest: "{{ cookies_file }}"
        mode: "0600"
      when: youtube_cookies is defined and youtube_cookies | length > 0

    - name: Build scraper command
      ansible.builtin.set_fact:
        scraper_cmd: >-
          python3 {{ work_dir }}/pull_comments.py
          --tier {{ tier }}
          --feed-repo-dir {{ feed_repo_dir }}
          {{ ('--cookies ' + cookies_file) if (youtube_cookies is defined and youtube_cookies | length > 0) else '' }}

    - name: Run comment scraper
      ansible.builtin.command:
        cmd: "{{ scraper_cmd }}"
      register: scrape_result
      changed_when: "'Feed published' in scrape_result.stdout"

    - name: Show scraper output
      ansible.builtin.debug:
        var: scrape_result.stdout_lines
